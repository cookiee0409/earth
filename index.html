<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neon Earth</title>
  <meta name="description" content="보랏빛·파랏빛·초록빛 네온으로 빛나는, 돌리고 확대할 수 있는 인터랙티브 지구본" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="globe" aria-label="네온빛으로 빛나는 회전하는 지구본. 드래그로 돌리고 휠로 확대·축소할 수 있습니다."></canvas>

  <div id="controls">
    <button id="zoom-in" aria-label="확대" title="확대 (+)">+</button>
    <button id="zoom-out" aria-label="축소" title="축소 (−)">−</button>
    <button id="reset" aria-label="초기화" title="초기 위치로">⟳</button>
  </div>

  <div id="hint">드래그로 돌리기 · 휠 또는 ± 버튼으로 확대·축소</div>

  <div id="legend" aria-hidden="true">
    <span class="lg-title">대륙별 색상</span>
    <span><i style="background:#5dff9b"></i>북미</span>
    <span><i style="background:#ff8a4d"></i>남미</span>
    <span><i style="background:#5df9ff"></i>유럽</span>
    <span><i style="background:#ffd25d"></i>아프리카</span>
    <span><i style="background:#ff5dd2"></i>아시아</span>
    <span><i style="background:#b98aff"></i>오세아니아</span>
  </div>

  <div id="flightbar">
    <button id="live" aria-label="실시간 실측 데이터 전환" title="OpenSky 실시간 항공기">LIVE</button>
    <button id="play" aria-label="날짜 자동 재생/일시정지" title="재생/일시정지">▶</button>
    <div id="slidewrap">
      <input type="range" id="dateslider" min="0" max="0" value="0" aria-label="날짜 선택" />
      <div id="readout">
        <span id="rodate">—</span>
        <span id="rocount">—</span>
        <span id="romodeled" title="실측이 아닌 대표값(모델) 데이터입니다">대표값</span>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="globe.js"></script>
</body>
</html>
