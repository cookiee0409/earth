<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neon Earth</title>
  <meta name="description" content="보랏빛·파랏빛·초록빛 네온으로 빛나는, 돌리고 확대할 수 있는 인터랙티브 지구본" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="globe" aria-label="네온빛으로 빛나는 회전하는 지구본. 드래그로 돌리고 휠로 확대·축소할 수 있습니다."></canvas>

  <div id="controls">
    <button id="zoom-in" aria-label="확대" title="확대 (+)">+</button>
    <button id="zoom-out" aria-label="축소" title="축소 (−)">−</button>
    <button id="reset" aria-label="초기화" title="초기 위치로">⟳</button>
  </div>

  <div id="hint">드래그로 돌리기 · 휠 또는 ± 버튼으로 확대·축소</div>

  <div id="filterbox">
    <div class="fl-sec">
      <div class="fl-title"><span class="fl-dot dep"></span>출발 · 클릭 시 국가</div>
      <div id="dep-items"></div>
    </div>
    <div class="fl-sec">
      <div class="fl-title"><span class="fl-dot arr"></span>도착 · 클릭 시 국가</div>
      <div id="arr-items"></div>
    </div>
  </div>

  <div id="countrypanel" hidden>
    <div id="cp-head">
      <span id="cp-title"></span>
      <button id="cp-close" aria-label="닫기">✕</button>
    </div>
    <div id="cp-list"></div>
    <div class="cp-foot">국가 체크 = 필터 · 국가명 클릭 = 공항 목록</div>
  </div>

  <div id="routepop" hidden></div>

  <div id="flightbar">
    <div class="fb-row">
      <button id="live" aria-label="실시간 실측 데이터 전환" title="adsb.lol 실시간 항공기">LIVE</button>
      <button id="play" aria-label="일시정지/재생" title="일시정지 (화면 멈춤)">❚❚</button>
      <input type="range" id="dateslider" min="0" max="0" value="0" aria-label="날짜 선택" />
    </div>
    <div class="fb-row fb-row2">
      <input type="date" id="datepick" aria-label="날짜 직접 입력" />
      <div id="speeds" role="group" aria-label="재생 속도">
        <button data-sp="1" class="on">1×</button>
        <button data-sp="2">2×</button>
        <button data-sp="4">4×</button>
        <button data-sp="8">8×</button>
        <button data-sp="16">16×</button>
      </div>
      <span id="speednote">1배속 = 하루 5초</span>
      <span id="rocount">—</span>
      <span id="romodeled" title="실측이 아닌 대표값(모델) 데이터입니다">대표값</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="globe.js"></script>
</body>
</html>
